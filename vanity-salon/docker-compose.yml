services:
  website:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: always
  database:
    image: postgres:latest
    environment:
      POSTGRES_USER: exampleuser
      POSTGRES_PASSWORD: examplepassword
      POSTGRES_DB: vanity_salon_db
    ports:
      - "5432:5432"
    restart: always
